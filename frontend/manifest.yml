---
applications:
  - name: sap-analytics-chatbot
    memory: 512M
    disk_quota: 1G
    instances: 1
    buildpacks:
      - nodejs_buildpack
    command: npm run start
    health-check-type: http
    health-check-http-endpoint: /
    timeout: 120
    env:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=400
      NPM_CONFIG_PRODUCTION: false   # keep devDependencies so `next start` works
