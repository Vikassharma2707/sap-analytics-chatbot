name: CI/CD → SAP BTP

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─── Shared env ──────────────────────────────────────────────────────────────
env:
  NODE_VERSION: '22'

jobs:
  # ── 1. Type-check + build ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check

      - name: Build Next.js app
        working-directory: frontend
        env:
          NODE_ENV: production
          # Add any NEXT_PUBLIC_* vars here if needed
          # NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      # Upload .next + public + package* so the deploy job can push without re-building
      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            frontend/.next/
            frontend/public/
            frontend/package.json
            frontend/package-lock.json
            frontend/manifest.yml
            frontend/.cfignore
            frontend/next.config.*
            frontend/tsconfig.json
          retention-days: 1

  # ── 2. Deploy to SAP BTP Cloud Foundry (main branch only) ─────────────────
  deploy:
    name: Deploy → BTP
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: app/

      # Install CF CLI v8
      - name: Install CF CLI
        run: |
          curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" \
            | tar -xz
          sudo mv cf8 /usr/local/bin/cf
          cf --version

      # Install node_modules inside the downloaded artefact (prod + devDeps for next start)
      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      # Log in to BTP Cloud Foundry
      - name: CF login
        run: |
          cf login \
            -a "${{ secrets.CF_API }}" \
            -u "${{ secrets.CF_USERNAME }}" \
            -p "${{ secrets.CF_PASSWORD }}" \
            -o "${{ secrets.CF_ORG }}" \
            -s "${{ secrets.CF_SPACE }}" \
            --skip-ssl-validation

      # Push — zero-downtime rolling deploy when >1 instance, simple push for 1
      - name: CF push
        working-directory: app
        run: cf push --strategy rolling || cf push

      # Print app URL + recent logs on failure
      - name: Show app info
        if: always()
        run: |
          cf app sap-analytics-chatbot || true
          cf logs sap-analytics-chatbot --recent || true
